name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Format & Types
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install pip-tools
          pip-sync requirements/dev.txt

      - name: Install package
        run: pip install -e .

      - name: Run ruff (lint)
        run: ruff check src/ tests/

      - name: Run black (format check)
        run: black --check src/ tests/

      - name: Run mypy (types)
        run: mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: institute
          POSTGRES_PASSWORD: password
          POSTGRES_DB: institute_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://institute:password@localhost:5432/institute_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      SECRET_KEY: ci-secret-key-only-for-tests
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install pip-tools
          pip-sync requirements/dev.txt

      - name: Install package
        run: pip install -e .

      - name: Run unit tests
        run: pytest tests/unit/ -v -m unit --no-cov

      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false